services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plannerpad
      POSTGRES_PASSWORD: plannerpad
      POSTGRES_DB: plannerpad
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plannerpad"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      DATABASE_URL: postgresql://plannerpad:plannerpad@db:5432/plannerpad
      PORT: 1337
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pg_data:
